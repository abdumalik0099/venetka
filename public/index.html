<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      /* Yuklanish vaqti uchun qora ekran */
      #scanning-overlay {
        display: none;
        position: absolute; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); z-index: 2;
      }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./students.mind; autoStart: false; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets id="assets-container">
        </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      </a-scene>

    <div id="scanning-overlay"></div>

    <script>
      const startAR = async () => {
        const sceneEl = document.querySelector('a-scene');
        const assetsEl = document.querySelector('#assets-container');
        
        try {
          // mapping.json faylini o'qish
          const response = await fetch('mapping.json');
          const mapping = await response.json();

          mapping.forEach((item, index) => {
            // 1. Video elementini yaratish
            const video = document.createElement("video");
            video.setAttribute("id", `vid-${index}`);
            video.setAttribute("src", item.video);
            video.setAttribute("loop", "true");
            video.setAttribute("crossorigin", "anonymous");
            video.setAttribute("playsinline", "");
            video.setAttribute("webkit-playsinline", "");
            assetsEl.appendChild(video);

            // 2. AR Anchor (Target) yaratish
            const entity = document.createElement("a-entity");
            entity.setAttribute("mindar-image-target", `targetIndex: ${index}`);
            
            // 3. Videoni ko'rsatuvchi Plane (Tekislik)
            const plane = document.createElement("a-video");
            plane.setAttribute("src", `#vid-${index}`);
            plane.setAttribute("position", "0 0 0");
            plane.setAttribute("height", "0.55"); // O'lchamini rasmga moslang
            plane.setAttribute("width", "1");
            plane.setAttribute("rotation", "0 0 0");
            
            entity.appendChild(plane);
            sceneEl.appendChild(entity);

            // 4. Voqealarni boshqarish (Play/Pause)
            entity.addEventListener("targetFound", () => {
              console.log("Target topildi:", index);
              video.play();
            });
            entity.addEventListener("targetLost", () => {
              video.pause();
            });
          });

          // AR tizimini ishga tushirish
          const {systems} = sceneEl;
          systems['mindar-image-system'].start(); 

        } catch (err) {
          console.error("Xatolik yuz berdi:", err);
        }
      };

      // Ekranga bir marta bosganda AR ishga tushadi
      window.addEventListener('click', () => {
        startAR();
      }, {once: true});
    </script>
  </body>
</html>
