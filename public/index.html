<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r123/three.min.js"></script>
</head>
<body>
    <div id="container"></div>
    <script type="module">
      const start = async() => {
        const response = await fetch('mapping.json');
        const mapping = await response.json();
        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
          container: document.querySelector("#container"),
          imageTargetSrc: './students.mind',
        });
        const {renderer, scene, camera} = mindarThree;
        mapping.forEach((item, index) => {
          const video = document.createElement("video");
          video.src = item.video;
          video.loop = true;
          video.crossOrigin = "anonymous";
          video.setAttribute('playsinline', '');
          const texture = new THREE.VideoTexture(video);
          const geometry = new THREE.PlaneGeometry(1, 1);
          const material = new THREE.MeshBasicMaterial({map: texture});
          const plane = new THREE.Mesh(geometry, material);
          const anchor = mindarThree.addAnchor(index);
          anchor.group.add(plane);
          anchor.onTargetFound = () => video.play();
          anchor.onTargetLost = () => video.pause();
        });
        await mindarThree.start();
        renderer.setAnimationLoop(() => renderer.render(scene, camera));
      }
      window.addEventListener('click', () => { start(); }, {once: true});
    </script>
</body>
</html>
