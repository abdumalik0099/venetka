<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #custom-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #fff; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 9999;
      }
      .loader-container { display: flex; gap: 20px; margin-bottom: 30px; }
      .shape-box {
        width: 55px; height: 55px; border: 4px solid #000;
        display: flex; justify-content: center; align-items: center;
        animation: videoRotate 3.5s infinite cubic-bezier(0.65, 0, 0.35, 1);
      }
      .shape-box::after { content: ''; width: 26px; height: 26px; background: #000; border-radius: 50%; }
      .s1 { animation-delay: 0.1s; } .s2 { animation-delay: 0.3s; } .s3 { animation-delay: 0.5s; }
      @keyframes videoRotate {
        0% { transform: rotate(0deg); }
        15%, 45% { transform: rotate(45deg); }
        65%, 100% { transform: rotate(0deg); }
      }
      .start-btn { padding: 12px 30px; border: 3px solid #000; background: #000; color: #fff; font-weight: bold; cursor: pointer; }
      .mindar-ui-scanning, .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>

    <div id="custom-loader" onclick="startExperience()">
      <div class="loader-container">
        <div class="shape-box s1"></div>
        <div class="shape-box s2"></div>
        <div class="shape-box s3"></div>
      </div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./students.mind; autoStart: true; uiLoading: no; filterMinCF:0.0001; filterBeta: 0.001;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets id="assets-container"></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
      let videos = [];
      let currentlyPlayingVideo = null;

      function startExperience() {
        const loader = document.querySelector('#custom-loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 600);
        videos.forEach(v => { v.muted = false; v.play().then(() => v.pause()); });
      }

      const loadAR = async () => {
        const sceneEl = document.querySelector('a-scene');
        const assetsEl = document.querySelector('#assets-container');
        
        try {
          const response = await fetch('./mapping.json');
          const mapping = await response.json();

          mapping.forEach((item, index) => {
            const video = document.createElement("video");
            video.setAttribute("id", `vid-${index}`);
            video.setAttribute("src", item.video);
            video.setAttribute("loop", "true");
            video.setAttribute("crossorigin", "anonymous");
            video.setAttribute("playsinline", "");
            video.muted = true;
            assetsEl.appendChild(video);
            videos.push(video);

            const entity = document.createElement("a-entity");
            entity.setAttribute("mindar-image-target", `targetIndex: ${index}`);
            
            const plane = document.createElement("a-video");
            plane.setAttribute("src", `#vid-${index}`);
            plane.setAttribute("position", "0 0 0");

            // --- VIDEONI QIYSHAYTIRMASLIK UCHUN O'LCHAMNI TO'G'IRLASH ---
            video.addEventListener('loadedmetadata', () => {
              const vWidth = video.videoWidth;
              const vHeight = video.videoHeight;
              const ratio = vHeight / vWidth;
              plane.setAttribute("height", ratio); // Balandlikni eniga nisbatan to'g'irlaydi
              plane.setAttribute("width", "1");
            });

            entity.appendChild(plane);
            sceneEl.appendChild(entity);

            entity.addEventListener("targetFound", () => {
              // Agar boshqa video o'ynayotgan bo'lsa, to'xtatish (yonma-yon rasm uchun)
              if (currentlyPlayingVideo && currentlyPlayingVideo !== video) {
                currentlyPlayingVideo.pause();
              }
              video.play().catch(err => console.log(err));
              currentlyPlayingVideo = video;
            });

            entity.addEventListener("targetLost", () => {
              if (currentlyPlayingVideo === video) {
                video.pause();
                currentlyPlayingVideo = null;
              }
            });
          });
        } catch (err) { console.error(err); }
      };

      document.addEventListener('DOMContentLoaded', loadAR);
    </script>
  </body>
</html>
